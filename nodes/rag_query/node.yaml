id: rag_query
name: RAG 검색 + LLM
version: 1.0.0
category: LLM
icon: database
author: 신병철

description: >
  질문을 벡터 검색하여 관련 문서 청크를 찾고,
  해당 맥락과 함께 LLM에게 답변을 생성시킨다.
  Retrieval-Augmented Generation (RAG) 파이프라인.

inputs:
  - name: 질문
    type: text
    description: 검색할 질문 또는 프롬프트

outputs:
  - name: 답변
    type: text
    description: RAG 기반 LLM 답변
  - name: 참조문서
    type: text
    description: 검색된 관련 문서 청크 (JSON)

params:
  - id: n_results
    label: 검색 개수
    type: integer
    default: 5
    description: "가져올 유사 문서 수"
  - id: provider
    label: LLM
    type: select
    default: "auto"
    options: ["auto", "local", "claude", "openai", "gemini"]
  - id: system_prompt
    label: 시스템 프롬프트
    type: text
    default: "주어진 참조 문서를 바탕으로 질문에 정확히 답하라. 참조 문서에 없는 내용은 추측하지 말고 '정보 없음'이라고 답하라."
  - id: max_tokens
    label: 최대 토큰
    type: integer
    default: 2048

resource:
  requires_api: null
  max_memory_mb: 2000
  estimated_time: slow

dependencies:
  - chromadb
  - sentence-transformers

use_when:
  - 저장된 문서에서 정보를 찾아 답변해야 할 때
  - 벡터 검색 기반 질의응답이 필요할 때
  - 임베딩된 데이터를 활용해 정확한 답변을 생성할 때
