id: url_to_md
name: URL → 마크다운
version: 1.0.0
category: 변환
icon: globe
author: 신병철

description: >
  웹 URL의 본문을 가져와 마크다운으로 변환한다.
  requests + BeautifulSoup으로 본문을 추출한다.

inputs:
  - name: URL
    type: text
    description: 가져올 웹 페이지 URL

outputs:
  - name: 텍스트
    type: text
    description: 추출된 마크다운 텍스트

params: []

resource:
  requires_api: null
  max_memory_mb: 100
  estimated_time: medium

dependencies:
  - requests>=2.31.0
  - beautifulsoup4>=4.12.0

use_when:
  - 웹 페이지의 내용을 가져와야 할 때
  - URL에서 본문 텍스트를 추출할 때
  - 온라인 문서를 마크다운으로 변환할 때
